<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autocheck Técnico</title>

<style>
body { font-family: Arial; margin:10px; }
.container { max-width:900px; margin:auto; }

label { font-weight:bold; display:block; margin-top:10px; }

input, select, button {
  width:100%;
  padding:10px;
  margin-top:5px;
  font-size:14px;
}

button {
  border:none;
  border-radius:6px;
  color:white;
  background:#1976d2;
}

.btn-foto { background:#4caf50; }
.btn-video { background:#ff5722; }

.card {
  border:2px solid #000;
  padding:10px;
  margin-top:20px;
}

.paso {
  border-bottom:1px solid #ccc;
  padding:10px 0;
}

.estado {
  font-weight:bold;
}

#progressContainer {
  width:100%;
  background:#ddd;
  margin-top:10px;
  display:none;
}

#progressBar {
  width:0%;
  height:20px;
  background:#4caf50;
  text-align:center;
  color:white;
}

#mensaje {
  text-align:center;
  margin-top:10px;
  font-weight:bold;
}

.ok { color:green; }
.error { color:red; }
.loading { color:orange; }
</style>
</head>

<body>

<div class="container">

<h2>Autocheck Técnico</h2>

<label>Fecha</label>
<input type="date" id="fecha">

<label>Cuadrilla</label>
<input type="text" id="cuadrilla">

<label>Integrantes</label>
<input type="text" id="integrantes">

<label>Sede</label>
<select id="sede">
<option value="">Seleccione...</option>
<option>Chincha</option>
<option>Pisco</option>
<option>Ica</option>
<option>Nasca</option>
<option>Palpa</option>
<option>Puquio</option>
<option>Coracora</option>
</select>

<div id="formularios"></div>

<label>Agregar actividad</label>
<select id="selectorActividad">
<option value="">Seleccione actividad</option>
</select>

<button onclick="enviar()">Enviar</button>

<div id="progressContainer">
  <div id="progressBar">0%</div>
</div>

<div id="mensaje"></div>

</div>

<script>

// 🔥 ENDPOINTS POWER AUTOMATE
const API_ACTIVIDADES = "https://default7b3f24e7f3d4409b9c08cd03e218e8.d2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/e1e4b5a968d84337a95abc796540f5e3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=68THhiLWnapC-IXEFFiRsdJdGh7HixX1J1U1kYnxM9I";

const API_ENVIO = "https://default7b3f24e7f3d4409b9c08cd03e218e8.d2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/1d48ef909be84d99a06d9e5bb6b3439a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=XMIANsWMsh_NL002VPcYudHuke3UsdyFSwGBBbcBsoE";

document.getElementById("fecha").valueAsDate = new Date();

let dataActividades = [];

// 🔹 CARGAR ACTIVIDADES
async function cargarActividades(){
  const res = await fetch(API_ACTIVIDADES,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({})
  });

  let data = await res.json();
  if(data.value) data = data.value;

  dataActividades = data;

  const selector = document.getElementById("selectorActividad");

  [...new Set(data.map(x=>x.ACTIVIDAD))].forEach(a=>{
    let opt = document.createElement("option");
    opt.value = a;
    opt.textContent = a;
    selector.appendChild(opt);
  });
}

cargarActividades();

// 🔹 AGREGAR ACTIVIDAD
selectorActividad.addEventListener("change",function(){
  if(!this.value) return;
  crearFormulario(this.value);
  this.value="";
  this.blur();
});

// 🔹 CREAR FORMULARIO
function crearFormulario(actividad){

  let cont = document.getElementById("formularios");

  let bloque = document.createElement("div");
  bloque.className="card";

  let html = `<h3>${actividad}</h3>`;

  let pasos = dataActividades.filter(x=>x.ACTIVIDAD===actividad);

  pasos.forEach((p,i)=>{

    html+=`
    <div class="paso">

      <div><b>${i+1}. ${p["ETAPAS DE LA ACTIVIDAD"]}</b></div>

      <div><b>Pregunta:</b> ${p["PREGUNTA"]}</div>
      <div><b>Criterio:</b> ${p["CRITERIO VISIBLE"]}</div>
      <div><b>Evidencia:</b> ${p["EVIDENCIA ¿Qué evidencia necesito?"]}</div>

      <label>Foto</label>
      <input type="file" class="foto" accept="image/*" capture="environment">

      <label>Video</label>
      <!-- 🔥 VIDEO REAL -->
      <input type="file" class="video" accept="video/*" capture="camcorder">

      <div class="estado">❌ Falta evidencia</div>

    </div>`;
  });

  html+=`<button onclick="this.parentElement.remove()">Eliminar</button>`;

  bloque.innerHTML = html;
  cont.appendChild(bloque);
}

// 🔹 BASE64
function toBase64(file){
  return new Promise(r=>{
    let reader=new FileReader();
    reader.onload=()=>r(reader.result.split(",")[1]);
    reader.readAsDataURL(file);
  });
}

// 🔹 PROGRESO
function progress(p){
  progressContainer.style.display="block";
  progressBar.style.width=p+"%";
  progressBar.innerText=p+"%";
}

// 🔹 LIMPIAR TEXTO
function limpiar(t){
  return t.replace("Pregunta: ","")
          .replace("Criterio: ","")
          .replace("Evidencia: ","");
}

// 🔹 ENVIAR
async function enviar(){

  mensaje.innerText="⏳ Enviando información...";
  mensaje.className="loading";

  let registros=[];
  let pasos = document.querySelectorAll(".paso");

  for(let i=0;i<pasos.length;i++){

    let paso = pasos[i];
    let actividad = paso.closest(".card").querySelector("h3").innerText;

    let foto = paso.querySelector(".foto").files[0];
    let video = paso.querySelector(".video").files[0];

    if(!foto && !video){
      mensaje.innerText="Falta evidencia";
      mensaje.className="error";
      return;
    }

    let file = video || foto;
    let base64 = await toBase64(file);

    registros.push({
      actividad,
      numero:i+1,
      etapa: paso.children[0].innerText,
      pregunta: limpiar(paso.children[1].innerText),
      criterio: limpiar(paso.children[2].innerText),
      evidencia: limpiar(paso.children[3].innerText),
      file:{
        name:`${i+1}-${actividad}`,
        type:file.type,
        data:base64
      }
    });

    progress(Math.round((i+1)/pasos.length*80));
  }

  await fetch(API_ENVIO,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      fecha:fecha.value,
      sede:sede.value,
      cuadrilla:cuadrilla.value,
      integrantes:integrantes.value,
      registros
    })
  });

  progress(100);

  setTimeout(()=>{
    mensaje.innerText="Gracias por contribuir con tu seguridad";
    mensaje.className="ok";
    location.reload();
  },1000);
}

</script>

</body>
</html>
