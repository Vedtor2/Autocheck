<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Autocheck Técnico</title>

<style>
body { font-family: Arial; margin: 10px; }
.container { max-width: 1000px; margin: auto; }

label { font-weight: bold; display: block; margin-top: 10px; }

.row {
  display:flex;
  gap:10px;
}

.row div { flex:1; }
.row div:nth-child(3){ flex:0.7; }

input, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

.bloque {
  border: 2px solid #000;
  padding: 10px;
  margin-top: 20px;
}

.fila {
  border-bottom: 1px solid #ccc;
  padding: 10px 0;
}

button {
  margin-top: 10px;
  padding: 10px;
  border:none;
  border-radius:8px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

.btn-foto { background:#4caf50; }
.btn-video { background:#ff5722; }
.btn-preview { background:#607d8b; }
.btn-delete { background:red; }

.preview {
  display:none;
  margin-top:5px;
}

.preview img, .preview video {
  width:100%;
}

#mensaje {
  margin-top: 15px;
  text-align: center;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Autocheck Técnico</h2>

<div class="row">
  <div>
    <label>Fecha:</label>
    <input type="date" id="fecha">
  </div>

  <div>
    <label>Sede:</label>
    <select id="sede" onchange="this.blur()">
      <option value="">Seleccione...</option>
      <option>Chincha</option>
      <option>Pisco</option>
      <option>Ica</option>
      <option>Nasca</option>
      <option>Palpa</option>
      <option>Puquio</option>
      <option>Coracora</option>
    </select>
  </div>

  <div>
    <label>Cuadrilla:</label>
    <input type="text" id="cuadrilla">
  </div>
</div>

<label>Integrantes:</label>
<input type="text" id="integrantes">

<div id="formularios"></div>

<label>Agregar actividad:</label>
<select id="selectorActividad">
  <option value="">Seleccione actividad</option>
</select>

<button onclick="enviar()">Enviar</button>

<div id="mensaje"></div>

</div>

<script>

const API_URL = "https://default7b3f24e7f3d4409b9c08cd03e218e8.d2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/e1e4b5a968d84337a95abc796540f5e3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=68THhiLWnapC-IXEFFiRsdJdGh7HixX1J1U1kYnxM9I";

const API_ENVIO = "https://default7b3f24e7f3d4409b9c08cd03e218e8.d2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/1d48ef909be84d99a06d9e5bb6b3439a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=XMIANsWMsh_NL002VPcYudHuke3UsdyFSwGBBbcBsoE";

document.getElementById("fecha").valueAsDate = new Date();

let pasos = {};

// 🔹 CARGAR ACTIVIDADES
async function cargarActividades(){
  const res = await fetch(API_URL);
  const data = await res.json();

  pasos = data.pasos;

  const selector = document.getElementById("selectorActividad");

  data.actividades.forEach(a => {
    let opt = document.createElement("option");
    opt.value = a;
    opt.textContent = a;
    selector.appendChild(opt);
  });
}

cargarActividades();

// 🔹 AGREGAR ACTIVIDAD
selectorActividad.addEventListener("change", function(){
  if(!this.value) return;
  crearFormulario(this.value);
  this.value = "";
});

// 🔹 CREAR FORMULARIO
function crearFormulario(actividad){

  let cont = document.getElementById("formularios");

  let bloque = document.createElement("div");
  bloque.className = "bloque";

  let html = `<h3>${actividad}</h3>`;

  pasos[actividad].forEach((p,i) => {

    html += `
    <div class="fila">

      <div><b>${i+1}. ${p.d}</b></div>
      <div><b>Criterio:</b> ${p.e}</div>
      <div><b>Evidencia:</b> ${p.f}</div>

      <input type="file" class="file-foto" accept="image/*" capture="environment" style="display:none" onchange="preview(this)">
      
      <!-- 🔥 FIX SAMSUNG -->
      <input type="file" class="file-video" accept="video/*" style="display:none" onchange="preview(this)">

      <button class="btn-foto" onclick="this.previousElementSibling.previousElementSibling.click()">📷</button>
      <button class="btn-video" onclick="this.previousElementSibling.click()">🎥</button>
      <button class="btn-preview" onclick="toggle(this)">👁</button>

      <div class="preview"></div>

    </div>`;
  });

  html += `<button class="btn-delete" onclick="this.parentElement.remove()">Eliminar</button>`;

  bloque.innerHTML = html;
  cont.appendChild(bloque);

  cont.appendChild(document.getElementById("selectorActividad"));
}

// 🔹 PREVIEW
function preview(input){

  let fila = input.parentElement;
  let preview = fila.querySelector(".preview");

  let file = input.files[0];
  let url = URL.createObjectURL(file);

  preview.innerHTML = file.type.includes("image")
    ? `<img src="${url}">`
    : `<video src="${url}" controls></video>`;
}

// 🔹 TOGGLE
function toggle(btn){
  let preview = btn.parentElement.querySelector(".preview");
  preview.style.display = preview.style.display==="block" ? "none":"block";
}

// 🔹 BASE64
function fileToBase64(file){
  return new Promise((resolve)=>{
    let reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = ()=>resolve(reader.result.split(",")[1]);
  });
}

// 🔹 ENVIAR (MISMO FLUJO)
async function enviar(){

  const bloques = document.querySelectorAll(".bloque");

  for (let bloque of bloques){

    let actividad = bloque.querySelector("h3").innerText;
    let filas = bloque.querySelectorAll(".fila");

    for (let i = 0; i < filas.length; i++){

      let fila = filas[i];

      let foto = fila.querySelector(".file-foto").files[0];
      let video = fila.querySelector(".file-video").files[0];

      if(!foto && !video){
        mensaje.innerText = `Falta evidencia en ${actividad} paso ${i+1}`;
        return;
      }
    }
  }

  mensaje.innerText="Enviando...";

  fetch(API_ENVIO,{
    method:"POST",
    body: JSON.stringify({
      fecha:fecha.value,
      sede:sede.value,
      cuadrilla:cuadrilla.value,
      integrantes:integrantes.value
    })
  })
  .then(()=> {
    mensaje.innerText="Gracias por contribuir con tu seguridad";
    location.reload();
  })
  .catch(()=>{
    mensaje.innerText="Error conexión";
  });
}

</script>

</body>
</html>
