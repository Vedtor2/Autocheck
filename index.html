<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autocheck Técnico</title>

<style>
body { font-family: Arial; margin:10px; }
.container { max-width:700px; margin:auto; }

.row { display:flex; gap:5px; }
.row > * { flex:1; }

input, select, button {
  width:100%;
  padding:10px;
  margin-top:5px;
  font-size:14px;
}

button {
  border:none;
  border-radius:6px;
  color:white;
  background:#1976d2;
}

.btn-foto { background:#4caf50; }
.btn-video { background:#ff5722; }
.btn-ver { background:#607d8b; }

.card {
  border:1px solid #ccc;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}

.paso {
  border-top:1px dashed #aaa;
  margin-top:10px;
  padding-top:10px;
}

.estado { font-weight:bold; margin-top:5px; }

.preview video, .preview img { width:100%; margin-top:5px; }

#mensaje {
  text-align:center;
  margin-top:10px;
  font-weight:bold;
}
.ok { color:green; }
.error { color:red; }
.loading { color:orange; }
</style>
</head>

<body>

<div class="container">

<h3>Autocheck Técnico</h3>

<div class="row">
<input type="date" id="fecha">
<input type="text" id="cuadrilla" placeholder="Cuadrilla">
<select id="sede" onchange="this.blur()">
<option value="">Sede</option>
<option>Chincha</option>
<option>Pisco</option>
<option>Ica</option>
<option>Nasca</option>
<option>Palpa</option>
<option>Puquio</option>
<option>Coracora</option>
</select>
</div>

<input type="text" id="integrantes" placeholder="Integrantes">

<div id="actividades"></div>

<button onclick="agregarActividad()">Agregar Actividad</button>
<button onclick="enviar()">Enviar</button>

<div id="mensaje"></div>

</div>

<script>

// 🔥 TUS ENDPOINTS
const API_ACTIVIDADES = "https://default7b3f24e7f3d4409b9c08cd03e218e8.d2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/e1e4b5a968d84337a95abc796540f5e3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=68THhiLWnapC-IXEFFiRsdJdGh7HixX1J1U1kYnxM9I";

const API_ENVIO = "https://default7b3f24e7f3d4409b9c08cd03e218e8.d2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/1d48ef909be84d99a06d9e5bb6b3439a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=XMIANsWMsh_NL002VPcYudHuke3UsdyFSwGBBbcBsoE";

fecha.value = new Date().toISOString().split('T')[0];

let dataActividades = [];
let listaActividades = [];

// 🔹 CARGAR ACTIVIDADES
async function cargarActividades(){
  try{
    const res = await fetch(API_ACTIVIDADES,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({})
    });

    let data = await res.json();
    if(data.value) data = data.value;

    dataActividades = data;
    listaActividades = [...new Set(data.map(x=>x.ACTIVIDAD))];

    agregarActividad();

  }catch(e){
    mostrarMensaje("Error cargando actividades","error");
  }
}

// 🔹 AGREGAR ACTIVIDAD
function agregarActividad(){

  let div = document.createElement("div");
  div.className="card";

  let opciones = `<option value="">Seleccione actividad</option>`;
  listaActividades.forEach(a => opciones += `<option>${a}</option>`);

  div.innerHTML = `
    <select onchange="this.blur(); cargarPasos(this)">
      ${opciones}
    </select>
  `;

  actividades.appendChild(div);
}

// 🔹 CARGAR PASOS
function cargarPasos(select){

  let cont = select.parentElement;
  cont.querySelectorAll(".paso").forEach(e=>e.remove());

  let pasos = dataActividades.filter(x => x.ACTIVIDAD === select.value);

  pasos.forEach((p,i)=>{

    let div = document.createElement("div");
    div.className="paso";

    div.innerHTML = `
      <b>Paso ${i+1}</b>

      <div>${p["ETAPAS DE LA ACTIVIDAD"]}</div>
      <div>${p["PREGUNTA"]}</div>
      <div>${p["CRITERIO VISIBLE"]}</div>
      <div>${p["EVIDENCIA ¿Qué evidencia necesito?"]}</div>

      <input type="file" class="foto" accept="image/*" capture="environment" style="display:none" onchange="archivo(this)">
      
      <!-- 🔥 VIDEO FIX -->
      <input type="file" class="video" accept="video/*" capture="camcorder" style="display:none" onchange="archivo(this)">

      <button class="btn-foto" onclick="this.previousElementSibling.previousElementSibling.click()">📷 Foto</button>
      <button class="btn-video" onclick="this.previousElementSibling.click()">🎥 Video</button>

      <div class="estado">❌ Falta evidencia</div>
    `;

    cont.appendChild(div);
  });
}

// 🔹 ARCHIVO
function archivo(input){

  let paso = input.parentElement;
  let estado = paso.querySelector(".estado");

  estado.innerHTML="✔ Completo";
  estado.style.color="green";
}

// 🔹 BASE64
function toBase64(file){
  return new Promise(r=>{
    let reader=new FileReader();
    reader.onload=()=>r(reader.result.split(",")[1]);
    reader.readAsDataURL(file);
  });
}

// 🔹 MENSAJE
function mostrarMensaje(txt, tipo){
  let m = document.getElementById("mensaje");
  m.className = tipo;
  m.innerText = txt;
}

// 🔹 ENVIAR
async function enviar(){

  const fechaVal = fecha.value;
  const sedeVal = sede.value;
  const cuadrillaVal = cuadrilla.value;
  const integrantesVal = integrantes.value;

  if(!fechaVal || !sedeVal || !cuadrillaVal || !integrantesVal){
    mostrarMensaje("Completa todos los campos","error");
    return;
  }

  let registros = [];
  let pasos = document.querySelectorAll(".paso");

  for(let i=0;i<pasos.length;i++){

    let paso = pasos[i];
    let actividad = paso.closest(".card").querySelector("select").value;

    let foto = paso.querySelector(".foto").files[0];
    let video = paso.querySelector(".video").files[0];

    if(!foto && !video){
      mostrarMensaje("Falta evidencia","error");
      return;
    }

    let file = video || foto;
    let base64 = await toBase64(file);

    registros.push({
      actividad,
      numero:i+1,
      etapa: paso.children[1].innerText,
      pregunta: paso.children[2].innerText,
      criterio: paso.children[3].innerText,
      evidencia: paso.children[4].innerText,
      file:{
        name:`${i+1}-${actividad}`,
        type:file.type,
        data:base64
      }
    });
  }

  mostrarMensaje("Enviando...","loading");

  try{
    await fetch(API_ENVIO,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        fecha:fechaVal,
        sede:sedeVal,
        cuadrilla:cuadrillaVal,
        integrantes:integrantesVal,
        registros
      })
    });

    mostrarMensaje("Gracias por contribuir con tu seguridad","ok");

  }catch(e){
    mostrarMensaje("Error de envío","error");
  }
}

window.onload = cargarActividades;

</script>

</body>
</html>
