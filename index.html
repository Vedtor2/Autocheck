<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autocheck Técnico</title>

<style>
body { font-family: Arial; margin:10px; }
.container { max-width:600px; margin:auto; }

label { font-weight:bold; display:block; margin-top:10px; }

input, select, button {
  width:100%;
  padding:10px;
  margin-top:5px;
  font-size:16px;
}

button {
  background:#1976d2;
  color:white;
  border:none;
  margin-top:15px;
}

.card {
  border:1px solid #ccc;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}

.paso {
  border-top:1px dashed #aaa;
  margin-top:10px;
  padding-top:10px;
}

/* 🔥 PROGRESO */
#progressContainer {
  width:100%;
  background:#ddd;
  border-radius:10px;
  margin-top:15px;
  display:none;
}

#progressBar {
  width:0%;
  height:20px;
  background:#4caf50;
  border-radius:10px;
  text-align:center;
  color:white;
  font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h2>Autocheck Técnico</h2>

<label>Fecha</label>
<input type="date" id="fecha">

<label>Cuadrilla</label>
<input type="text" id="cuadrilla">

<label>Integrantes</label>
<input type="text" id="integrantes">

<label>Sede</label>
<select id="sede">
<option value="">Seleccione</option>
<option>Chincha</option>
<option>Pisco</option>
<option>Ica</option>
<option>Nasca</option>
<option>Palpa</option>
<option>Puquio</option>
<option>Coracora</option>
</select>

<div id="actividades"></div>

<button id="btnAgregar" onclick="agregarActividad()" disabled>Agregar Actividad</button>
<button id="btnEnviar" onclick="enviar()">Enviar</button>

<div id="progressContainer">
  <div id="progressBar">0%</div>
</div>

</div>

<script>

// 🔥 ENDPOINTS
const API_ACTIVIDADES = "https://default7b3f24e7f3d4409b9c08cd03e218e8.d2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/e1e4b5a968d84337a95abc796540f5e3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=68THhiLWnapC-IXEFFiRsdJdGh7HixX1J1U1kYnxM9I";

const API_ENVIO = "https://default7b3f24e7f3d4409b9c08cd03e218e8.d2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/1d48ef909be84d99a06d9e5bb6b3439a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=XMIANsWMsh_NL002VPcYudHuke3UsdyFSwGBBbcBsoE";

// FECHA
document.getElementById("fecha").value = new Date().toISOString().split('T')[0];

// 🔥 CARGAR ACTIVIDADES
async function cargarActividades(){

  const res = await fetch(API_ACTIVIDADES,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ tipo:"actividades" })
  });

  let data = await res.json();
  if(data.value) data = data.value;

  window.dataActividades = data;
  window.listaActividades = [...new Set(data.map(r => r["ACTIVIDAD"]))];

  document.getElementById("btnAgregar").disabled = false;
  agregarActividad();
}

// 🔥 AGREGAR ACTIVIDAD
function agregarActividad(){

  let div = document.createElement("div");
  div.className="card";

  let opciones = `<option value="">Seleccione actividad</option>`;
  window.listaActividades.forEach(a=>{
    opciones += `<option>${a}</option>`;
  });

  div.innerHTML = `
    <label>Actividad</label>
    <select class="actividad" onchange="cargarPasos(this)">
      ${opciones}
    </select>
  `;

  document.getElementById("actividades").appendChild(div);
}

// 🔥 CARGAR PASOS
function cargarPasos(select){

  let actividad = select.value;
  let contenedor = select.parentElement;

  contenedor.querySelectorAll(".paso").forEach(e => e.remove());

  let pasos = window.dataActividades.filter(r => r["ACTIVIDAD"] === actividad);

  pasos.forEach((p, i)=>{

    let div = document.createElement("div");
    div.className = "paso";

    div.innerHTML = `
      <label>Paso ${i+1}</label>
      <div>${p["ETAPAS DE LA ACTIVIDAD"]}</div>

      <label>Pregunta</label>
      <div>${p["PREGUNTA"]}</div>

      <label>Criterio Visible</label>
      <div>${p["CRITERIO VISIBLE"]}</div>

      <label>Evidencia requerida</label>
      <div>${p["EVIDENCIA ¿Qué evidencia necesito?"]}</div>

      <input type="file" class="file" multiple>
    `;

    contenedor.appendChild(div);
  });
}

// 🔥 BASE64
function toBase64(file){
  return new Promise(resolve=>{
    let reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = ()=> resolve(reader.result);
  });
}

// 🔥 PROGRESO
function updateProgress(p){
  let bar = document.getElementById("progressBar");
  bar.style.width = p + "%";
  bar.innerText = p + "%";
}

// 🔥 ENVÍO
async function enviar(){

  document.getElementById("btnEnviar").disabled = true;
  document.getElementById("progressContainer").style.display = "block";

  let data = {
    fecha: fecha.value,
    cuadrilla: cuadrilla.value,
    integrantes: integrantes.value,
    sede: sede.value,
    registros:[]
  };

  let totalFiles = 0;

  for(let card of document.querySelectorAll(".card")){
    for(let paso of card.querySelectorAll(".paso")){
      totalFiles += paso.querySelector(".file").files.length;
    }
  }

  let processed = 0;

  for(let card of document.querySelectorAll(".card")){

    let actividad = card.querySelector(".actividad").value;
    let pasos = card.querySelectorAll(".paso");

    for(let i=0; i<pasos.length; i++){

      let paso = pasos[i];
      let files = paso.querySelector(".file").files;

      let etapa = paso.children[1].innerText;
      let pregunta = paso.children[3].innerText;
      let criterio = paso.children[5].innerText;
      let evidencia = paso.children[7].innerText;

      for(let j=0; j<files.length; j++){

        let file = files[j];

        let nombreArchivo = `${i+1}-${etapa}`;
        if(j > 0) nombreArchivo += `(${j})`;

        let base64 = await toBase64(file);

        data.registros.push({
          actividad,
          numero: i+1,
          etapa,
          pregunta,
          criterio,
          evidencia,
          nombreArchivo,
          file:{
            nombre: nombreArchivo,
            tipo: file.type,
            data: base64.split(",")[1]
          }
        });

        processed++;
        updateProgress(Math.round((processed / totalFiles) * 100));
      }
    }
  }

  await fetch(API_ENVIO,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(data)
  });

  updateProgress(100);

  alert("Gracias por contribuir con tu seguridad");
  location.reload();
}

// INIT
window.onload = ()=>{
  cargarActividades();
}

</script>

</body>
</html>
