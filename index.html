<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autocheck Técnico</title>

<style>
body { font-family: Arial; margin:10px; }
.container { max-width:600px; margin:auto; }

label { font-weight:bold; display:block; margin-top:10px; }

input, select, button {
  width:100%;
  padding:10px;
  margin-top:5px;
  font-size:16px;
}

button {
  background:#1976d2;
  color:white;
  border:none;
  margin-top:15px;
}

.card {
  border:1px solid #ccc;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}

/* BARRA DE CARGA */
#loader {
  display:none;
  width:100%;
  background:#ccc;
  height:10px;
  margin-top:10px;
}

#bar {
  width:0%;
  height:100%;
  background:green;
}

/* OFFLINE */
#offline {
  display:none;
  background:red;
  color:white;
  padding:10px;
  text-align:center;
}
</style>
</head>

<body>

<div id="offline">SIN CONEXIÓN - se enviará automáticamente</div>

<div class="container">

<h2>Autocheck Técnico</h2>

<label>Fecha</label>
<input type="date" id="fecha">

<label>Cuadrilla</label>
<input type="text" id="cuadrilla">

<label>Integrantes</label>
<input type="text" id="integrantes">

<label>Sede</label>
<select id="sede">
<option value="">Seleccione</option>
<option>Chincha</option>
<option>Pisco</option>
<option>Ica</option>
<option>Nasca</option>
<option>Palpa</option>
<option>Puquio</option>
<option>Coracora</option>
</select>

<div id="actividades"></div>

<button onclick="agregarActividad()">Agregar Actividad</button>

<button onclick="enviar()">Enviar</button>

<div id="loader"><div id="bar"></div></div>

</div>

<script>

const API_URL = "TU_URL_POWER_AUTOMATE";

// FECHA AUTOMÁTICA
document.getElementById("fecha").value = new Date().toISOString().split('T')[0];

// DETECTAR INTERNET
window.addEventListener("offline", ()=>{
  document.getElementById("offline").style.display="block";
});

window.addEventListener("online", ()=>{
  document.getElementById("offline").style.display="none";
  enviarPendientes();
});

// AGREGAR ACTIVIDAD
function agregarActividad(){

  let div = document.createElement("div");
  div.className="card";

  div.innerHTML = `
    <label>Actividad</label>
    <input type="text" class="actividad">

    <label>Evidencia</label>
    <input type="file" accept="image/*,video/*" class="file">
  `;

  document.getElementById("actividades").appendChild(div);
}

// OBTENER DATA
function getData(){

  let registros=[];

  document.querySelectorAll(".card").forEach((card,i)=>{

    let file = card.querySelector(".file").files[0];

    registros.push({
      actividad: card.querySelector(".actividad").value,
      orden:i+1,
      file:file
    });

  });

  return {
    fecha:fecha.value,
    sede:sede.value,
    cuadrilla:cuadrilla.value,
    integrantes:integrantes.value,
    registros
  };
}

// VALIDAR
function validar(data){

  if(!data.cuadrilla || !data.sede){
    alert("Completar datos");
    return false;
  }

  for(let r of data.registros){
    if(!r.file){
      alert("Faltan evidencias");
      return false;
    }
  }

  return true;
}

// BARRA
function avanzarBarra(){

  let bar = document.getElementById("bar");
  let width = 0;

  let interval = setInterval(()=>{
    width+=10;
    bar.style.width = width+"%";
    if(width>=100) clearInterval(interval);
  },200);
}

// ENVIAR
async function enviar(){

  let data = getData();

  if(!validar(data)) return;

  if(!navigator.onLine){
    guardarOffline(data);
    alert("Sin conexión, se enviará automáticamente");
    return;
  }

  document.getElementById("loader").style.display="block";
  avanzarBarra();

  let registrosFinal=[];

  for(let r of data.registros){

    let base64 = await toBase64(r.file);

    registrosFinal.push({
      actividad:r.actividad,
      orden:r.orden,
      c:"",
      d:"",
      e:"",
      f:"",
      file:{
        name:r.file.name,
        type:r.file.type,
        data:base64.split(',')[1]
      }
    });
  }

  data.registros=registrosFinal;

  fetch(API_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify(data)
  })
  .then(()=>{
    alert("Enviado correctamente");
    localStorage.removeItem("pendiente");
    location.reload();
  })
  .catch(()=>{
    guardarOffline(data);
  });
}

// GUARDAR OFFLINE
function guardarOffline(data){
  localStorage.setItem("pendiente", JSON.stringify(data));
}

// REINTENTO AUTOMÁTICO
function enviarPendientes(){

  let data = localStorage.getItem("pendiente");

  if(data){
    fetch(API_URL,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:data
    })
    .then(()=>{
      alert("Datos enviados automáticamente");
      localStorage.removeItem("pendiente");
    });
  }
}

// BASE64
function toBase64(file){
  return new Promise(res=>{
    let reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload=()=>res(reader.result);
  });
}

</script>

</body>
</html>
