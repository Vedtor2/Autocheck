<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autocheck Técnico</title>

<style>
body { font-family: Arial; margin:10px; background:#f5f5f5; }
.container { max-width:700px; margin:auto; }

input, select, button {
  width:100%;
  padding:10px;
  margin-top:5px;
  font-size:14px;
}

button {
  border:none;
  border-radius:8px;
  color:white;
  font-weight:bold;
}

.btn-foto { background:#4caf50; }
.btn-video { background:#ff5722; }
.btn-preview { background:#607d8b; }

.card {
  background:white;
  border-radius:10px;
  padding:10px;
  margin-top:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.paso {
  border-top:1px dashed #aaa;
  margin-top:10px;
  padding-top:10px;
}

.preview { display:none; }
.preview img, .preview video { width:100%; border-radius:8px; }

.estado { font-weight:bold; }

#progressContainer {
  width:100%;
  background:#ddd;
  border-radius:10px;
  margin-top:10px;
  display:none;
}

#progressBar {
  width:0%;
  height:20px;
  background:#4caf50;
  border-radius:10px;
  text-align:center;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<h3>Autocheck Técnico</h3>

<input type="date" id="fecha">
<input type="text" id="cuadrilla" placeholder="Cuadrilla">
<input type="text" id="integrantes" placeholder="Integrantes">

<select id="sede">
<option value="">Seleccione sede</option>
<option>Chincha</option>
<option>Pisco</option>
<option>Ica</option>
<option>Nasca</option>
<option>Palpa</option>
<option>Puquio</option>
<option>Coracora</option>
</select>

<div id="actividades"></div>

<button onclick="agregarActividad()">Agregar Actividad</button>
<button onclick="enviar()">Enviar</button>

<div id="progressContainer">
  <div id="progressBar">0%</div>
</div>

<div id="mensaje"></div>

</div>

<script>

// 🔥 TUS ENDPOINTS (NO CAMBIADOS)
const API_ACTIVIDADES = "https://default7b3f24e7f3d4409b9c08cd03e218e8.d2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/e1e4b5a968d84337a95abc796540f5e3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=68THhiLWnapC-IXEFFiRsdJdGh7HixX1J1U1kYnxM9I";

const API_ENVIO = "https://default7b3f24e7f3d4409b9c08cd03e218e8.d2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/1d48ef909be84d99a06d9e5bb6b3439a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=XMIANsWMsh_NL002VPcYudHuke3UsdyFSwGBBbcBsoE";

fecha.value = new Date().toISOString().split('T')[0];

let dataActividades = [];

// 🔹 CARGAR ACTIVIDADES
async function cargarActividades(){
  try{
    let res = await fetch(API_ACTIVIDADES,{method:"POST"});
    let data = await res.json();
    if(data.value) data = data.value;

    dataActividades = data;
  }catch(e){
    mensaje.innerText="Error cargando actividades";
  }
}

// 🔹 AGREGAR ACTIVIDAD
function agregarActividad(){

  let div = document.createElement("div");
  div.className="card";

  let opciones=`<option value="">Seleccione actividad</option>`;
  [...new Set(dataActividades.map(x=>x.ACTIVIDAD))]
  .forEach(a=>opciones+=`<option>${a}</option>`);

  div.innerHTML=`
    <select onchange="this.blur(); cargarPasos(this)">
      ${opciones}
    </select>
  `;

  actividades.appendChild(div);
}

// 🔹 PASOS
function cargarPasos(select){

  let cont = select.parentElement;
  cont.querySelectorAll(".paso").forEach(e=>e.remove());

  let pasos = dataActividades.filter(x=>x.ACTIVIDAD===select.value);

  pasos.forEach((p,i)=>{

    let div=document.createElement("div");
    div.className="paso";

    div.innerHTML=`
      <b>Paso ${i+1}</b>

      <div><b>Etapa:</b> ${p["ETAPAS DE LA ACTIVIDAD"]}</div>
      <div><b>Pregunta:</b> ${p["PREGUNTA"]}</div>
      <div><b>Criterio:</b> ${p["CRITERIO VISIBLE"]}</div>
      <div><b>Evidencia:</b> ${p["EVIDENCIA ¿Qué evidencia necesito?"]}</div>

      <input type="file" class="foto" accept="image/*" capture="environment" style="display:none" onchange="preview(this)">
      <input type="file" class="video" accept="video/*" capture="camcorder" style="display:none" onchange="preview(this)">

      <button class="btn-foto" onclick="this.previousElementSibling.previousElementSibling.click()">📷 Foto</button>
      <button class="btn-video" onclick="this.previousElementSibling.click()">🎥 Video</button>
      <button class="btn-preview" onclick="toggle(this)">👁 Ver evidencia</button>

      <div class="preview"></div>
      <div class="estado">❌ Falta evidencia</div>
    `;

    cont.appendChild(div);
  });
}

// 🔹 PREVIEW
function preview(input){

  let paso = input.parentElement;
  let preview = paso.querySelector(".preview");
  let estado = paso.querySelector(".estado");

  let file = input.files[0];
  let url = URL.createObjectURL(file);

  if(file.type.includes("image")){
    preview.innerHTML=`<img src="${url}">`;
  } else {
    preview.innerHTML=`<video src="${url}" controls></video>`;
  }

  estado.innerText="✔ Completo";
  estado.style.color="green";
}

// 🔹 TOGGLE
function toggle(btn){
  let preview = btn.parentElement.querySelector(".preview");
  preview.style.display = preview.style.display==="none"?"block":"none";
}

// 🔹 BASE64
function toBase64(file){
  return new Promise(r=>{
    let reader=new FileReader();
    reader.onload=()=>r(reader.result.split(",")[1]);
    reader.readAsDataURL(file);
  });
}

// 🔹 PROGRESO
function progress(p){
  progressContainer.style.display="block";
  progressBar.style.width=Math.round(p)+"%";
  progressBar.innerText=Math.round(p)+"%";
}

// 🔹 ENVIAR
async function enviar(){

  mensaje.innerText="⏳ Enviando información...";

  let pasos = document.querySelectorAll(".paso");
  let registros=[];

  try{

    for(let i=0;i<pasos.length;i++){

      let paso = pasos[i];
      let actividad = paso.closest(".card").querySelector("select").value;

      let file = paso.querySelector(".foto").files[0] || paso.querySelector(".video").files[0];

      if(!file){
        mensaje.innerText="Falta evidencia";
        return;
      }

      let base64 = await toBase64(file);

      registros.push({
        actividad,
        numero:i+1,
        etapa: paso.children[1].innerText.replace("Etapa: ",""),
        pregunta: paso.children[2].innerText.replace("Pregunta: ",""),
        criterio: paso.children[3].innerText.replace("Criterio: ",""),
        evidencia: paso.children[4].innerText.replace("Evidencia: ",""),
        file:{
          name:`${i+1}-${actividad}`,
          type:file.type,
          data:base64
        }
      });

      progress((i+1)/pasos.length*80);
    }

    const response = await fetch(API_ENVIO,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        fecha:fecha.value,
        sede:sede.value,
        cuadrilla:cuadrilla.value,
        integrantes:integrantes.value,
        registros
      })
    });

    if(!response.ok){
      throw new Error("Error HTTP");
    }

    progress(100);

    setTimeout(()=>{
      mensaje.innerText="Gracias por contribuir con tu seguridad";
      location.reload();
    },1000);

  }catch(e){
    console.error(e);
    mensaje.innerText="Error al enviar";
  }
}

cargarActividades();

</script>

</body>
</html>
