<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Autocheck Técnico</title>

<style>
body { font-family: Arial; margin: 10px; }
.container { max-width: 1000px; margin: auto; }

label { font-weight: bold; display: block; margin-top: 10px; }

input, select {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

.bloque {
  border: 2px solid #000;
  padding: 10px;
  margin-top: 20px;
}

.fila {
  border-bottom: 1px solid #ccc;
  padding: 10px 0;
}

button {
  margin-top: 10px;
  padding: 10px;
}

.btn-delete {
  background: red;
  color: white;
}

#mensaje {
  margin-top: 15px;
  text-align: center;
  font-weight: bold;
}

.ok { color: green; }
.error { color: red; }
.loading { color: orange; }
</style>
</head>

<body>

<div class="container">

<h2>Autocheck Técnico</h2>

<label>Fecha:</label>
<input type="date" id="fecha">

<label>Cuadrilla:</label>
<input type="text" id="cuadrilla">

<label>Integrantes:</label>
<input type="text" id="integrantes">

<label>Sede:</label>
<select id="sede">
  <option value="">Seleccione...</option>
  <option>Chincha</option>
  <option>Pisco</option>
  <option>Ica</option>
  <option>Nasca</option>
  <option>Palpa</option>
  <option>Puquio</option>
  <option>Coracora</option>
</select>

<div id="formularios"></div>

<div id="selectorContainer">
  <label>Agregar actividad:</label>
  <select id="selectorActividad">
    <option value="">Seleccione actividad</option>
  </select>
</div>

<button onclick="enviar()">Enviar</button>

<div id="mensaje"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyNlSzt0UF7HGBji3Pfoz84J9tOdCxt9C1AUEtG9iXsF9sZCmXYedgGimgPSPdj_H_d/exec";

document.getElementById("fecha").valueAsDate = new Date();

let pasos = {};

// 🔹 CARGAR ACTIVIDADES
async function cargarActividades(){
  try{
    const res = await fetch(API_URL);
    const data = await res.json();

    pasos = data.pasos;

    const selector = document.getElementById("selectorActividad");

    data.actividades.forEach(a => {
      let opt = document.createElement("option");
      opt.value = a;
      opt.textContent = a;
      selector.appendChild(opt);
    });

  }catch(e){
    mostrarMensaje("Error cargando actividades ❌","error");
  }
}

cargarActividades();

// 🔹 AGREGAR ACTIVIDAD
document.getElementById("selectorActividad").addEventListener("change", function(){
  if(!this.value) return;
  crearFormulario(this.value);
  this.value = "";
  this.blur(); // 🔥 cierre automático
});

// 🔹 CREAR FORMULARIO
function crearFormulario(actividad){

  let cont = document.getElementById("formularios");

  let bloque = document.createElement("div");
  bloque.className = "bloque";

  let html = `<h3>${actividad}</h3>`;

  let orden = 1;

  pasos[actividad].forEach(p => {

    html += `
    <div class="fila">

      <div><b>${orden}. ${p.d}</b></div>

      <div><b>Criterio Visible:</b> ${p.e}</div>

      <div><b>Evidencia:</b> ${p.f}</div>

      <label>Foto:</label>
      <input type="file" class="file-foto" accept="image/*" capture="environment">

      <label>Video:</label>
      <input type="file" class="file-video" accept="video/*" capture="camcorder">

    </div>`;

    orden++;
  });

  html += `<button class="btn-delete" onclick="this.parentElement.remove()">Eliminar actividad</button>`;

  bloque.innerHTML = html;
  cont.appendChild(bloque);

  cont.appendChild(document.getElementById("selectorContainer"));
}

// 🔹 BASE64
function fileToBase64(file){
  return new Promise((resolve)=>{
    let reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = ()=>resolve(reader.result.split(",")[1]);
  });
}

// 🔹 MENSAJE
function mostrarMensaje(t, tipo){
  let m = document.getElementById("mensaje");
  m.className = tipo;
  m.innerText = t;
}

// 🔹 ENVIAR
async function enviar(){

  const fecha = document.getElementById("fecha").value;
  const sede = document.getElementById("sede").value;
  const cuadrilla = document.getElementById("cuadrilla").value;
  const integrantes = document.getElementById("integrantes").value;

  if(!fecha || !sede || !cuadrilla || !integrantes){
    mostrarMensaje("Completa todos los datos ⚠️", "error");
    return;
  }

  let registros = [];

  const bloques = document.querySelectorAll(".bloque");

  if(bloques.length === 0){
    mostrarMensaje("Agrega al menos una actividad ⚠️", "error");
    return;
  }

  for (let bloque of bloques){

    let actividad = bloque.querySelector("h3").innerText;
    let filas = bloque.querySelectorAll(".fila");

    let orden = 1;

    for (let i = 0; i < filas.length; i++){

      let fila = filas[i];

      let foto = fila.querySelector(".file-foto").files[0];
      let video = fila.querySelector(".file-video").files[0];

      if(!foto && !video){
        mostrarMensaje("Debes cargar evidencia (foto o video) 📷", "error");
        return;
      }

      let file = video || foto;
      let base64 = await fileToBase64(file);

      let pasoData = pasos[actividad][i];

      registros.push({
        actividad,
        orden,
        c: pasoData.c,
        d: pasoData.d,
        e: pasoData.e,
        f: pasoData.f,
        file: {
          name: file.name,
          type: file.type,
          data: base64
        }
      });

      orden++;
    }
  }

  mostrarMensaje("⏳ Enviando información...", "loading");

  try{
    const res = await fetch(API_URL,{
      method:"POST",
      body: JSON.stringify({
        fecha,
        sede,
        cuadrilla,
        integrantes,
        registros
      })
    });

    const json = await res.json();

    if(json.status==="success"){
      mostrarMensaje("Gracias por contribuir con tu seguridad ✅", "ok");

      document.getElementById("formularios").innerHTML = "";
      document.getElementById("cuadrilla").value = "";
      document.getElementById("integrantes").value = "";
      document.getElementById("sede").value = "";

    } else {
      mostrarMensaje("Error: "+json.message, "error");
    }

  }catch(e){
    mostrarMensaje("Error conexión ❌", "error");
  }
}

</script>

</body>
</html>
