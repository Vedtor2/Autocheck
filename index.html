<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autocheck Técnico</title>

<style>
body { font-family: Arial; margin:10px; }
.container { max-width:600px; margin:auto; }

.row { display:flex; gap:5px; }
.row > * { flex:1; }

input, select, button {
  width:100%;
  padding:8px;
  margin-top:5px;
  font-size:14px;
}

button {
  border:none;
  border-radius:6px;
  color:white;
  background:#1976d2;
}

.btn-foto { background:#4caf50; }
.btn-video { background:#ff5722; }
.btn-ver { background:#607d8b; }

.card {
  border:1px solid #ccc;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}

.paso {
  border-top:1px dashed #aaa;
  margin-top:10px;
  padding-top:10px;
}

.estado { font-weight:bold; margin-top:5px; }

.preview video, .preview img { width:100%; margin-top:5px; }

#progressContainer {
  width:100%;
  background:#ddd;
  border-radius:10px;
  margin-top:10px;
  display:none;
}

#progressBar {
  width:0%;
  height:20px;
  background:#4caf50;
  border-radius:10px;
  text-align:center;
  color:white;
}

#loader {
  display:none;
  text-align:center;
  margin-top:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h3>Autocheck Técnico</h3>

<div class="row">
<input type="date" id="fecha">
<input type="text" id="cuadrilla" placeholder="Cuadrilla">
<select id="sede" onchange="this.blur()">
<option value="">Sede</option>
<option>Chincha</option>
<option>Pisco</option>
<option>Ica</option>
<option>Nasca</option>
<option>Palpa</option>
<option>Puquio</option>
<option>Coracora</option>
</select>
</div>

<input type="text" id="integrantes" placeholder="Integrantes">

<div id="actividades"></div>

<button onclick="agregarActividad()">Agregar Actividad</button>
<button onclick="enviar()">Enviar</button>

<div id="progressContainer">
  <div id="progressBar">0%</div>
</div>

<div id="loader">⏳ Enviando información...</div>

</div>

<script>

const API_ACTIVIDADES = "https://default7b3f24e7f3d4409b9c08cd03e218e8...";
const API_ENVIO = "https://default7b3f24e7f3d4409b9c08cd03e218e8...";

fecha.value = new Date().toISOString().split('T')[0];

// =============================
// 🔥 COMPRESIÓN IMAGEN + VIDEO
// =============================
async function toBase64(file){

  return new Promise((resolve) => {

    // =========================
    // 📷 IMAGEN
    // =========================
    if(file.type.startsWith("image/")){

      let img = new Image();
      let reader = new FileReader();

      reader.onload = e => img.src = e.target.result;

      img.onload = () => {

        let canvas = document.createElement("canvas");
        let ctx = canvas.getContext("2d");

        let maxWidth = 1024;
        let scale = Math.min(1, maxWidth / img.width);

        canvas.width = img.width * scale;
        canvas.height = img.height * scale;

        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        let compressed = canvas.toDataURL("image/jpeg", 0.6);

        resolve(compressed);
      };

      reader.readAsDataURL(file);
    }

    // =========================
    // 🎥 VIDEO (optimización básica)
    // =========================
    else{

      // ⚠️ Limitar tamaño máximo (ej: 10MB)
      if(file.size > 10 * 1024 * 1024){
        alert("El video es muy pesado. Máximo 10MB.");
        return;
      }

      let reader = new FileReader();

      reader.onload = () => resolve(reader.result);

      reader.readAsDataURL(file);
    }

  });
}

// =============================
// RESTO DE TU CÓDIGO (IGUAL)
// =============================

async function cargarActividades(){
  let res = await fetch(API_ACTIVIDADES,{method:"POST"});
  let data = await res.json();
  if(data.value) data = data.value;

  window.dataActividades = data;
  window.listaActividades = [...new Set(data.map(x=>x.ACTIVIDAD))];

  agregarActividad();
}

function agregarActividad(){
  let div = document.createElement("div");
  div.className="card";

  let opciones = `<option value="">Seleccione actividad</option>`;
  listaActividades.forEach(a => opciones += `<option>${a}</option>`);

  div.innerHTML = `
    <select class="actividad" onchange="this.blur(); cargarPasos(this)">
      ${opciones}
    </select>
  `;

  actividades.appendChild(div);
}

function cargarPasos(select){

  let cont = select.parentElement;
  cont.querySelectorAll(".paso").forEach(e=>e.remove());

  let pasos = dataActividades.filter(x => x.ACTIVIDAD === select.value);

  pasos.forEach((p,i)=>{

    let div = document.createElement("div");
    div.className="paso";

    div.innerHTML = `
      <b>Paso ${i+1}</b>

      <div><b>Etapa:</b> ${p["ETAPAS DE LA ACTIVIDAD"]}</div>
      <div><b>Pregunta:</b> ${p["PREGUNTA"]}</div>
      <div><b>Criterio:</b> ${p["CRITERIO VISIBLE"]}</div>
      <div><b>Evidencia:</b> ${p["EVIDENCIA ¿Qué evidencia necesito?"]}</div>

      <input type="file" class="foto" accept="image/*" capture="environment" style="display:none" onchange="archivo(this)">
      <input type="file" class="video" accept="video/*" capture="environment" style="display:none" onchange="archivo(this)">

      <button class="btn-foto" onclick="this.previousElementSibling.previousElementSibling.click()">📷 Foto</button>
      <button class="btn-video" onclick="this.previousElementSibling.click()">🎥 Video</button>

      <button class="btn-ver" onclick="toggle(this)">👁 Ver evidencia ⬇</button>

      <div class="preview" style="display:none;"></div>
      <div class="estado">❌ Falta evidencia</div>
    `;

    cont.appendChild(div);
  });
}

function archivo(input){

  let paso = input.parentElement;
  let preview = paso.querySelector(".preview");
  let estado = paso.querySelector(".estado");
  let btn = paso.querySelector(".btn-ver");

  let file = input.files[0];
  if(!file) return;

  let url = URL.createObjectURL(file);

  if(file.type.includes("image")){
    preview.innerHTML = `<img src="${url}">`;
  }else{
    preview.innerHTML = `<video src="${url}" controls></video>`;
  }

  estado.innerHTML="✔ Completo";
  estado.style.color="green";

  preview.style.display="block";
  btn.innerHTML="👁 Ocultar evidencia ⬆";
}

function toggle(btn){
  let preview = btn.parentElement.querySelector(".preview");

  if(preview.style.display==="none"){
    preview.style.display="block";
    btn.innerHTML="👁 Ocultar evidencia ⬆";
  }else{
    preview.style.display="none";
    btn.innerHTML="👁 Ver evidencia ⬇";
  }
}

function progress(p){
  progressContainer.style.display="block";
  progressBar.style.width=p+"%";
  progressBar.innerText=p+"%";
}

async function enviar(){

  loader.style.display="block";

  let data = {
    fecha:fecha.value,
    cuadrilla:cuadrilla.value,
    integrantes:integrantes.value,
    sede:sede.value,
    registros:[]
  };

  let pasos = document.querySelectorAll(".paso");

  for(let i=0;i<pasos.length;i++){

    let paso = pasos[i];
    let actividad = paso.closest(".card").querySelector(".actividad").value;

    let file = paso.querySelector(".foto").files[0] || paso.querySelector(".video").files[0];

    if(!file){
      alert("Falta evidencia en paso "+(i+1));
      return;
    }

    let base64 = await toBase64(file);

    data.registros.push({
      actividad,
      numero:i+1,
      etapa:paso.children[1].innerText.replace("Etapa: ",""),
      pregunta:paso.children[2].innerText.replace("Pregunta: ",""),
      criterio:paso.children[3].innerText.replace("Criterio: ",""),
      evidencia:paso.children[4].innerText.replace("Evidencia: ",""),
      nombreArchivo:`${i+1}-${actividad}`,
      file:{
        tipo:file.type,
        data:base64.split(",")[1]
      }
    });

    progress(Math.round((i+1)/pasos.length*80));
  }

  await fetch(API_ENVIO,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(data)
  });

  progress(100);

  setTimeout(()=>{
    alert("Gracias por contribuir con tu seguridad");
    location.reload();
  },800);
}

window.onload = cargarActividades;

</script>

</body>
</html>
