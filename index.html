<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autocheck Técnico</title>

<style>
body { font-family: Arial; margin:10px; }
.container { max-width:600px; margin:auto; }

.row { display:flex; gap:5px; }
.row > * { flex:1; }

input, select, button {
  width:100%;
  padding:8px;
  margin-top:5px;
  font-size:14px;
}

button {
  border:none;
  border-radius:6px;
  color:white;
  background:#1976d2;
}

.btn-foto { background:#4caf50; }
.btn-video { background:#ff5722; }
.btn-stop { background:#d32f2f; }

.card {
  border:1px solid #ccc;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}

.paso {
  border-top:1px dashed #aaa;
  margin-top:10px;
  padding-top:10px;
}

.estado { font-weight:bold; margin-top:5px; }
.preview video, .preview img { width:100%; margin-top:5px; }

#progressContainer {
  width:100%;
  background:#ddd;
  border-radius:10px;
  margin-top:10px;
  display:none;
}

#progressBar {
  width:0%;
  height:20px;
  background:#4caf50;
  border-radius:10px;
  text-align:center;
  color:white;
}

#loader {
  display:none;
  text-align:center;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h3>Autocheck Técnico</h3>

<div class="row">
<input type="date" id="fecha">
<input type="text" id="cuadrilla" placeholder="Cuadrilla">
<select id="sede" onchange="this.blur()">
<option value="">Sede</option>
<option>Chincha</option>
<option>Pisco</option>
<option>Ica</option>
<option>Nasca</option>
<option>Palpa</option>
<option>Puquio</option>
<option>Coracora</option>
</select>
</div>

<input type="text" id="integrantes" placeholder="Integrantes">

<div id="actividades"></div>

<button onclick="agregarActividad()">Agregar Actividad</button>
<button onclick="enviar()">Enviar</button>

<div id="progressContainer">
  <div id="progressBar">0%</div>
</div>

<div id="loader">⏳ Enviando información...</div>

</div>

<script>

// ENDPOINTS
const API_ACTIVIDADES = "https://default7b3f24e7f3d4409b9c08cd03e218e8.d2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/e1e4b5a968d84337a95abc796540f5e3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=68THhiLWnapC-IXEFFiRsdJdGh7HixX1J1U1kYnxM9I";

const API_ENVIO = "https://default7b3f24e7f3d4409b9c08cd03e218e8.d2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/1d48ef909be84d99a06d9e5bb6b3439a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=XMIANsWMsh_NL002VPcYudHuke3UsdyFSwGBBbcBsoE";

fecha.value = new Date().toISOString().split('T')[0];

// CARGAR ACTIVIDADES
async function cargarActividades(){
  let res = await fetch(API_ACTIVIDADES,{method:"POST"});
  let data = await res.json();
  if(data.value) data = data.value;

  window.dataActividades = data;
  window.listaActividades = [...new Set(data.map(x=>x.ACTIVIDAD))];

  agregarActividad();
}

// AGREGAR ACTIVIDAD
function agregarActividad(){
  let div = document.createElement("div");
  div.className="card";

  let opciones = `<option value="">Seleccione actividad</option>`;
  listaActividades.forEach(a => opciones += `<option>${a}</option>`);

  div.innerHTML = `
    <select class="actividad" onchange="this.blur(); cargarPasos(this)">
      ${opciones}
    </select>
  `;

  actividades.appendChild(div);
}

// PASOS
function cargarPasos(select){

  let cont = select.parentElement;
  cont.querySelectorAll(".paso").forEach(e=>e.remove());

  let pasos = dataActividades.filter(x => x.ACTIVIDAD === select.value);

  pasos.forEach((p,i)=>{

    let div = document.createElement("div");
    div.className="paso";

    div.innerHTML = `
      <b>Paso ${i+1}</b>

      <div>Etapa: ${p["ETAPAS DE LA ACTIVIDAD"]}</div>
      <div>Pregunta: ${p["PREGUNTA"]}</div>
      <div>Criterio: ${p["CRITERIO VISIBLE"]}</div>
      <div>Evidencia: ${p["EVIDENCIA ¿Qué evidencia necesito?"]}</div>

      <input type="file" class="foto" accept="image/*" capture="environment" style="display:none" onchange="archivo(this)">

      <button class="btn-foto" onclick="this.previousElementSibling.click()">📷 Foto</button>

      <button class="btn-video" onclick="iniciarVideo(this)">🎥 Video</button>
      <button class="btn-stop" onclick="detenerVideo(this)">⏹ Detener</button>

      <video class="videoPreview" autoplay muted style="display:none"></video>

      <div class="preview"></div>
      <div class="estado">❌ Falta evidencia</div>
    `;

    cont.appendChild(div);
  });
}

// VIDEO REAL
let mediaRecorder;
let recordedChunks = [];

async function iniciarVideo(btn){

  let paso = btn.parentElement;
  let video = paso.querySelector(".videoPreview");

  let stream = await navigator.mediaDevices.getUserMedia({
    video:{ facingMode:"environment" },
    audio:true
  });

  video.srcObject = stream;
  video.style.display="block";

  recordedChunks = [];

  mediaRecorder = new MediaRecorder(stream);

  mediaRecorder.ondataavailable = e=>{
    if(e.data.size>0) recordedChunks.push(e.data);
  };

  mediaRecorder.start();
}

function detenerVideo(btn){

  mediaRecorder.stop();

  let blob = new Blob(recordedChunks,{type:"video/mp4"});

  let paso = btn.parentElement;
  paso.videoBlob = blob;

  paso.querySelector(".estado").innerHTML="✔ Video grabado";
  paso.querySelector(".estado").style.color="green";
}

// FOTO
function archivo(input){

  let paso = input.parentElement;
  let file = input.files[0];

  let url = URL.createObjectURL(file);

  paso.querySelector(".preview").innerHTML = `<img src="${url}">`;

  paso.querySelector(".estado").innerHTML="✔ Completo";
  paso.querySelector(".estado").style.color="green";
}

// BASE64
function toBase64(file){
  return new Promise(r=>{
    let reader=new FileReader();
    reader.onload=()=>r(reader.result);
    reader.readAsDataURL(file);
  });
}

// PROGRESO
function progress(p){
  progressContainer.style.display="block";
  progressBar.style.width=p+"%";
  progressBar.innerText=p+"%";
}

// ENVIAR
async function enviar(){

  loader.style.display="block";

  let data = {
    fecha:fecha.value,
    cuadrilla:cuadrilla.value,
    integrantes:integrantes.value,
    sede:sede.value,
    registros:[]
  };

  let pasos = document.querySelectorAll(".paso");

  for(let i=0;i<pasos.length;i++){

    let paso = pasos[i];
    let actividad = paso.closest(".card").querySelector(".actividad").value;

    let file = paso.querySelector(".foto").files[0] || paso.videoBlob;

    if(!file){
      alert("Falta evidencia en paso "+(i+1));
      return;
    }

    let base64 = await toBase64(file);

    data.registros.push({
      actividad,
      numero:i+1,
      etapa:paso.children[1].innerText.replace("Etapa: ",""),
      pregunta:paso.children[2].innerText.replace("Pregunta: ",""),
      criterio:paso.children[3].innerText.replace("Criterio: ",""),
      evidencia:paso.children[4].innerText.replace("Evidencia: ",""),
      nombreArchivo:`${i+1}-${actividad}`,
      file:{
        tipo:file.type || "video/mp4",
        data:base64.split(",")[1]
      }
    });

    progress(Math.round((i+1)/pasos.length*80));
  }

  await fetch(API_ENVIO,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(data)
  });

  progress(100);

  setTimeout(()=>{
    alert("Gracias por contribuir con tu seguridad");
    location.reload();
  },800);
}

window.onload = cargarActividades;

</script>

</body>
</html>
