<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autocheck Técnico</title>

<style>
body { font-family: Arial; margin:10px; }
.container { max-width:600px; margin:auto; }

input, select, button {
  width:100%;
  padding:10px;
  margin-top:5px;
  font-size:16px;
}

button {
  border:none;
  border-radius:6px;
  color:white;
  background:#1976d2;
}

.btn-foto { background:#4caf50; }
.btn-video { background:#ff5722; }
.btn-ver { background:#607d8b; }

.card {
  border:1px solid #ccc;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}

.paso {
  border-top:1px dashed #aaa;
  margin-top:10px;
  padding-top:10px;
}

.preview { display:none; }

#progressContainer {
  width:100%;
  background:#ddd;
  border-radius:10px;
  margin-top:15px;
  display:none;
}

#progressBar {
  width:0%;
  height:20px;
  background:#4caf50;
  border-radius:10px;
  text-align:center;
  color:white;
}
</style>
</head>

<body>

<div class="container">

<h2>Autocheck Técnico</h2>

<input type="date" id="fecha">
<input type="text" id="cuadrilla" placeholder="Cuadrilla">
<input type="text" id="integrantes" placeholder="Integrantes">

<select id="sede" onchange="this.blur()">
<option value="">Seleccione sede</option>
<option>Chincha</option>
<option>Pisco</option>
<option>Ica</option>
<option>Nasca</option>
<option>Palpa</option>
<option>Puquio</option>
<option>Coracora</option>
</select>

<div id="actividades"></div>

<button id="btnAgregar" onclick="agregarActividad()">Agregar Actividad</button>
<button id="btnEnviar" onclick="enviar()">Enviar</button>

<div id="progressContainer">
  <div id="progressBar">0%</div>
</div>

</div>

<script>

// 🔥 ENDPOINTS (SIN CAMBIOS)
const API_ACTIVIDADES = "https://default7b3f24e7f3d4409b9c08cd03e218e8.d2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/e1e4b5a968d84337a95abc796540f5e3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=68THhiLWnapC-IXEFFiRsdJdGh7HixX1J1U1kYnxM9I";

const API_ENVIO = "https://default7b3f24e7f3d4409b9c08cd03e218e8.d2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/1d48ef909be84d99a06d9e5bb6b3439a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=XMIANsWMsh_NL002VPcYudHuke3UsdyFSwGBBbcBsoE";

fecha.value = new Date().toISOString().split('T')[0];

// 🔥 CARGAR ACTIVIDADES
async function cargarActividades(){
  try{
    let res = await fetch(API_ACTIVIDADES,{method:"POST"});
    let text = await res.text();

    console.log("RESPUESTA:", text);

    let data = JSON.parse(text);
    if(data.value) data = data.value;

    window.dataActividades = data;
    window.listaActividades = [...new Set(data.map(x=>x.ACTIVIDAD))];

    agregarActividad();

  }catch(e){
    console.error("ERROR ACTIVIDADES", e);
    alert("Error cargando actividades");
  }
}

// 🔥 AGREGAR ACTIVIDAD
function agregarActividad(){

  let div = document.createElement("div");
  div.className="card";

  let opciones = `<option value="">Seleccione actividad</option>`;
  listaActividades.forEach(a => opciones += `<option>${a}</option>`);

  div.innerHTML = `
    <select onchange="this.blur(); cargarPasos(this)">
      ${opciones}
    </select>
  `;

  actividades.appendChild(div);
}

// 🔥 CARGAR PASOS (YA CORREGIDO)
function cargarPasos(select){

  let cont = select.parentElement;
  cont.querySelectorAll(".paso").forEach(e=>e.remove());

  let pasos = dataActividades.filter(x => x.ACTIVIDAD === select.value);

  pasos.forEach((p,i)=>{

    let div = document.createElement("div");
    div.className="paso";

    div.innerHTML = `
      <b>Paso ${i+1}</b>
      <div>${p["ETAPAS DE LA ACTIVIDAD"]}</div>
      <div>${p["PREGUNTA"]}</div>
      <div>${p["CRITERIO VISIBLE"]}</div>
      <div>${p["EVIDENCIA ¿Qué evidencia necesito?"]}</div>

      <input type="file" class="foto" accept="image/*" capture="environment" style="display:none" onchange="preview(this)">
      
      <!-- 🔥 VIDEO REAL -->
      <input type="file" class="video" accept="video/*" style="display:none" onchange="preview(this)">

      <button class="btn-foto" onclick="this.previousElementSibling.previousElementSibling.click()">📷 Foto</button>
      <button class="btn-video" onclick="this.previousElementSibling.click()">🎥 Video</button>

      <button class="btn-ver" onclick="toggle(this)">👁 Ver evidencia</button>

      <div class="preview"></div>
    `;

    cont.appendChild(div);
  });
}

// 🔥 PREVIEW
function preview(input){

  let paso = input.parentElement;
  let preview = paso.querySelector(".preview");

  let file = input.files[0];
  if(!file) return;

  let url = URL.createObjectURL(file);

  if(file.type.includes("image")){
    preview.innerHTML = `<img src="${url}" style="width:100%">`;
  }else{
    preview.innerHTML = `<video src="${url}" controls style="width:100%"></video>`;
  }

  preview.style.display="none";
}

// 🔥 TOGGLE
function toggle(btn){
  let preview = btn.parentElement.querySelector(".preview");

  if(preview.style.display=="none"){
    preview.style.display="block";
    btn.innerText="🔽 Ocultar evidencia";
  }else{
    preview.style.display="none";
    btn.innerText="👁 Ver evidencia";
  }
}

// 🔥 BASE64
function toBase64(file){
  return new Promise(r=>{
    let reader=new FileReader();
    reader.onload=()=>r(reader.result);
    reader.readAsDataURL(file);
  });
}

// 🔥 PROGRESO
function progress(p){
  progressContainer.style.display="block";
  progressBar.style.width=p+"%";
  progressBar.innerText=p+"%";
}

// 🔥 ENVIAR CORRECTO
async function enviar(){

  let data = {
    fecha:fecha.value,
    cuadrilla:cuadrilla.value,
    integrantes:integrantes.value,
    sede:sede.value,
    registros:[]
  };

  let pasos = document.querySelectorAll(".paso");

  let total = pasos.length;
  let count = 0;

  for(let i=0;i<pasos.length;i++){

    let paso = pasos[i];

    let file = paso.querySelector(".foto").files[0] || paso.querySelector(".video").files[0];

    if(!file){
      alert("Falta evidencia en paso "+(i+1));
      return;
    }

    let base64 = await toBase64(file);

    data.registros.push({
      actividad:"OK",
      numero:i+1,
      etapa:paso.children[1].innerText,
      pregunta:paso.children[2].innerText,
      criterio:paso.children[3].innerText,
      evidencia:paso.children[4].innerText,
      nombreArchivo:`${i+1}`,
      file:{
        tipo:file.type,
        data:base64.split(",")[1]
      }
    });

    count++;
    progress(Math.round((count/total)*80));
  }

  try{
    let res = await fetch(API_ENVIO,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(data)
    });

    console.log("RESPUESTA ENVIO:", res);

    progress(100);

    alert("Enviado correctamente");
    location.reload();

  }catch(e){
    console.error("ERROR ENVIO", e);
    alert("Error en envío");
  }
}

window.onload = cargarActividades;

</script>

</body>
</html>
