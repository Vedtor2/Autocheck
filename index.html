<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Autocheck Técnico</title>

<style>
body { font-family: Arial; margin: 10px; }
.container { max-width: 1000px; margin: auto; }

label { font-weight: bold; display: block; margin-top: 10px; }

input, select, button {
  width: 100%;
  padding: 8px;
  margin-top: 5px;
}

.bloque {
  border: 2px solid #000;
  padding: 10px;
  margin-top: 20px;
}

.fila {
  border-bottom: 1px solid #ccc;
  padding: 10px 0;
}

.btn-delete {
  background: red;
  color: white;
}

#mensaje {
  margin-top: 15px;
  text-align: center;
  font-weight: bold;
}

.ok { color: green; }
.error { color: red; }
.loading { color: orange; }
</style>
</head>

<body>

<div class="container">

<h2>Autocheck Técnico</h2>

<label>Fecha:</label>
<input type="date" id="fecha">

<label>Cuadrilla:</label>
<input type="text" id="cuadrilla">

<label>Integrantes:</label>
<input type="text" id="integrantes">

<label>Sede:</label>
<select id="sede">
  <option value="">Seleccione...</option>
  <option>Chincha</option>
  <option>Pisco</option>
  <option>Ica</option>
  <option>Nasca</option>
  <option>Palpa</option>
  <option>Puquio</option>
  <option>Coracora</option>
</select>

<div id="formularios"></div>

<div id="selectorContainer">
  <label>Agregar actividad:</label>
  <select id="selectorActividad">
    <option value="">Seleccione actividad</option>
  </select>
</div>

<button onclick="enviar()">Enviar</button>

<div id="mensaje"></div>

</div>

<script>

// 🔥 ENDPOINTS POWER AUTOMATE (LOS TUYOS)
const API_ACTIVIDADES = "https://default7b3f24e7f3d4409b9c08cd03e218e8.d2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/e1e4b5a968d84337a95abc796540f5e3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=68THhiLWnapC-IXEFFiRsdJdGh7HixX1J1U1kYnxM9I";

const API_ENVIO = "https://default7b3f24e7f3d4409b9c08cd03e218e8.d2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/1d48ef909be84d99a06d9e5bb6b3439a/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=XMIANsWMsh_NL002VPcYudHuke3UsdyFSwGBBbcBsoE";

document.getElementById("fecha").valueAsDate = new Date();

let pasos = {};

// 🔹 CARGAR ACTIVIDADES (Power Automate)
async function cargarActividades(){
  try{
    const res = await fetch(API_ACTIVIDADES,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({})
    });

    let data = await res.json();
    if(data.value) data = data.value;

    pasos = {};
    let actividades = [];

    data.forEach(x=>{
      if(!pasos[x.ACTIVIDAD]){
        pasos[x.ACTIVIDAD] = [];
        actividades.push(x.ACTIVIDAD);
      }
      pasos[x.ACTIVIDAD].push(x);
    });

    const selector = document.getElementById("selectorActividad");

    actividades.forEach(a=>{
      let opt = document.createElement("option");
      opt.value = a;
      opt.textContent = a;
      selector.appendChild(opt);
    });

  }catch(e){
    mostrarMensaje("Error cargando actividades ❌","error");
  }
}

cargarActividades();

// 🔹 AGREGAR ACTIVIDAD
document.getElementById("selectorActividad").addEventListener("change", function(){
  if(!this.value) return;
  crearFormulario(this.value);
  this.value="";
  this.blur();
});

// 🔹 CREAR FORMULARIO
function crearFormulario(actividad){

  let cont = document.getElementById("formularios");

  let bloque = document.createElement("div");
  bloque.className = "bloque";

  let html = `<h3>${actividad}</h3>`;

  let orden = 1;

  pasos[actividad].forEach(p => {

    html += `
    <div class="fila">

      <div><b>${orden}. ${p["ETAPAS DE LA ACTIVIDAD"]}</b></div>

      <div><b>Pregunta:</b> ${p["PREGUNTA"]}</div>
      <div><b>Criterio:</b> ${p["CRITERIO VISIBLE"]}</div>
      <div><b>Evidencia:</b> ${p["EVIDENCIA ¿Qué evidencia necesito?"]}</div>

      <label>Foto:</label>
      <input type="file" class="file-foto" accept="image/*" capture="environment">

      <label>Video:</label>
      <!-- 🔥 VIDEO FIX REAL -->
      <input type="file" class="file-video" accept="video/*" capture="camcorder">

    </div>`;

    orden++;
  });

  html += `<button class="btn-delete" onclick="this.parentElement.remove()">Eliminar actividad</button>`;

  bloque.innerHTML = html;
  cont.appendChild(bloque);

  cont.appendChild(document.getElementById("selectorContainer"));
}

// 🔹 BASE64
function fileToBase64(file){
  return new Promise((resolve)=>{
    let reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = ()=>resolve(reader.result.split(",")[1]);
  });
}

// 🔹 MENSAJE
function mostrarMensaje(t, tipo){
  let m = document.getElementById("mensaje");
  m.className = tipo;
  m.innerText = t;
}

// 🔹 ENVIAR (Power Automate)
async function enviar(){

  const fecha = document.getElementById("fecha").value;
  const sede = document.getElementById("sede").value;
  const cuadrilla = document.getElementById("cuadrilla").value;
  const integrantes = document.getElementById("integrantes").value;

  if(!fecha || !sede || !cuadrilla || !integrantes){
    mostrarMensaje("Completa todos los datos ⚠️", "error");
    return;
  }

  let registros = [];
  const bloques = document.querySelectorAll(".bloque");

  if(bloques.length===0){
    mostrarMensaje("Agrega una actividad ⚠️","error");
    return;
  }

  try{

    for(let bloque of bloques){

      let actividad = bloque.querySelector("h3").innerText;
      let filas = bloque.querySelectorAll(".fila");

      let orden = 1;

      for(let i=0;i<filas.length;i++){

        let fila = filas[i];

        let foto = fila.querySelector(".file-foto").files[0];
        let video = fila.querySelector(".file-video").files[0];

        if(!foto && !video){
          mostrarMensaje("Falta evidencia 📷","error");
          return;
        }

        let file = video || foto;
        let base64 = await fileToBase64(file);
        let pasoData = pasos[actividad][i];

        registros.push({
          actividad,
          numero: orden,
          etapa: pasoData["ETAPAS DE LA ACTIVIDAD"],
          pregunta: pasoData["PREGUNTA"],
          criterio: pasoData["CRITERIO VISIBLE"],
          evidencia: pasoData["EVIDENCIA ¿Qué evidencia necesito?"],
          file:{
            name: `${orden}-${actividad}`,
            type: file.type,
            data: base64
          }
        });

        orden++;
      }
    }

    mostrarMensaje("⏳ Enviando...", "loading");

    await fetch(API_ENVIO,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        fecha,
        sede,
        cuadrilla,
        integrantes,
        registros
      })
    });

    mostrarMensaje("Gracias por contribuir con tu seguridad ✅","ok");

    document.getElementById("formularios").innerHTML="";
    document.getElementById("cuadrilla").value="";
    document.getElementById("integrantes").value="";
    document.getElementById("sede").value="";

  }catch(e){
    console.error(e);
    mostrarMensaje("Error conexión ❌","error");
  }
}

</script>

</body>
</html>
