<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autocheck Técnico</title>

<style>
body { font-family: Arial; margin:10px; }
.container { max-width:600px; margin:auto; }

label { font-weight:bold; display:block; margin-top:10px; }

input, select, button {
  width:100%;
  padding:10px;
  margin-top:5px;
  font-size:16px;
}

button {
  background:#1976d2;
  color:white;
  border:none;
  margin-top:15px;
}

button:disabled {
  background:gray;
}

.card {
  border:1px solid #ccc;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}

.paso {
  border-top:1px dashed #aaa;
  margin-top:10px;
  padding-top:10px;
}

#debug {
  margin-top:10px;
  font-size:12px;
  color:#555;
}
</style>
</head>

<body>

<div class="container">

<h2>Autocheck Técnico</h2>

<label>Fecha</label>
<input type="date" id="fecha">

<label>Cuadrilla</label>
<input type="text" id="cuadrilla">

<label>Integrantes</label>
<input type="text" id="integrantes">

<label>Sede</label>
<select id="sede">
<option value="">Seleccione</option>
<option>Chincha</option>
<option>Pisco</option>
<option>Ica</option>
<option>Nasca</option>
<option>Palpa</option>
<option>Puquio</option>
<option>Coracora</option>
</select>

<div id="actividades"></div>

<button id="btnAgregar" onclick="agregarActividad()" disabled>Agregar Actividad</button>
<button onclick="enviar()">Enviar</button>

<div id="debug"></div>

</div>

<script>

// 🔥 TU ENDPOINT
const API_ACTIVIDADES = "https://default7b3f24e7f3d4409b9c08cd03e218e8.d2.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/e1e4b5a968d84337a95abc796540f5e3/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=68THhiLWnapC-IXEFFiRsdJdGh7HixX1J1U1kYnxM9I";

// FECHA
document.getElementById("fecha").value = new Date().toISOString().split('T')[0];

// 🔥 CARGAR ACTIVIDADES SEGURO
async function cargarActividades(){

  try{

    const res = await fetch(API_ACTIVIDADES,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ tipo:"actividades" })
    });

    if(!res.ok){
      throw new Error("Error HTTP: " + res.status);
    }

    let text = await res.text();

    document.getElementById("debug").innerText = "RAW RESPONSE:\n" + text;

    let data;

    try{
      data = JSON.parse(text);
    }catch(e){
      throw new Error("No es JSON válido");
    }

    // Soporta ambos formatos
    if(data.value){
      data = data.value;
    }

    if(!Array.isArray(data)){
      throw new Error("No es array");
    }

    window.dataActividades = data;

    window.listaActividades = [...new Set(data.map(r => r["ACTIVIDAD"]))];

    document.getElementById("btnAgregar").disabled = false;

    // crear primer bloque
    agregarActividad();

  }catch(e){

    console.error("ERROR:", e);

    document.getElementById("debug").innerText =
      "ERROR:\n" + e.message;

    alert("No se pudieron cargar actividades. Ver consola (F12)");

  }

}

// 🔥 AGREGAR ACTIVIDAD
function agregarActividad(){

  if(!window.listaActividades){
    alert("Aún no cargan las actividades");
    return;
  }

  let div = document.createElement("div");
  div.className="card";

  let opciones = `<option value="">Seleccione actividad</option>`;

  window.listaActividades.forEach(a=>{
    opciones += `<option>${a}</option>`;
  });

  div.innerHTML = `
    <label>Actividad</label>
    <select class="actividad" onchange="cargarPasos(this)">
      ${opciones}
    </select>
  `;

  document.getElementById("actividades").appendChild(div);
}

// 🔥 CARGAR PASOS
function cargarPasos(select){

  let actividad = select.value;
  if(!actividad) return;

  let contenedor = select.parentElement;

  contenedor.querySelectorAll(".paso").forEach(e => e.remove());

  let pasos = window.dataActividades.filter(r => r["ACTIVIDAD"] === actividad);

  pasos.forEach((p, i)=>{

    let div = document.createElement("div");
    div.className = "paso";

    div.innerHTML = `
      <label>Paso ${i+1}</label>
      <div>${p["PREGUNTA"] || ""}</div>

      <label>Criterio Visible</label>
      <div>${p["CRITERIO VISIBLE"] || ""}</div>

      <label>Evidencia requerida</label>
      <div>${p["EVIDENCIA ¿Qué evidencia necesito?"] || ""}</div>

      <input type="file" class="file">
    `;

    contenedor.appendChild(div);

  });

}

// 🔥 ENVIAR (solo debug por ahora)
function enviar(){

  let registros = [];

  document.querySelectorAll(".card").forEach(card=>{

    let actividad = card.querySelector(".actividad").value;

    card.querySelectorAll(".paso").forEach((paso,i)=>{

      let file = paso.querySelector(".file").files[0];

      registros.push({
        actividad,
        orden:i+1,
        pregunta: paso.children[1].innerText,
        criterio: paso.children[3].innerText,
        evidencia: paso.children[5].innerText,
        file
      });

    });

  });

  console.log("ENVIANDO:", registros);

}

// INICIO
window.onload = ()=>{
  cargarActividades();
}

</script>

</body>
</html>
